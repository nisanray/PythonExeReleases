name: Build and Release EXEs

on:
  push:
    branches:
      - master

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build all EXEs in Codes/
      run: |
        foreach ($f in Get-ChildItem -Path Codes -Filter *.py) {
          pyinstaller --onefile --windowed --distpath dist --hidden-import=flask --hidden-import=werkzeug --hidden-import=socket --hidden-import=engineio --hidden-import=socketio "$($f.FullName)"
        }
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: dist/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
